<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dream Groundworks</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:#0a1628;color:#fff;min-height:100vh;padding-bottom:70px}
/* HEADER */
.hdr{background:#0a1628;border-bottom:2px solid #3CB70A;padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.2rem}.hdr-logo span{color:#3CB70A}
.hdr-date{font-size:0.68rem;color:#8892a4}
/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#060e1a;border-top:2px solid #3CB70A;display:grid;grid-template-columns:repeat(6,1fr)}
.bni{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px;cursor:pointer;background:none;border:none;color:#8892a4;transition:color 0.2s}
.bni.active{color:#3CB70A}
.bni-icon{font-size:1.2rem;line-height:1}
.bni-label{font-size:0.5rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;margin-top:2px}
/* PAGES */
.pg{display:none;padding:14px 14px 20px;max-width:640px;margin:0 auto}
.pg.active{display:block}
/* COMPONENTS */
.sec{background:#112240;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px;margin-bottom:10px}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;font-weight:900;text-transform:uppercase;color:#3CB70A;letter-spacing:0.1em;margin-bottom:10px}
.stabs{display:flex;overflow-x:auto;scrollbar-width:none;background:#0d1e36;border-radius:8px;padding:3px;gap:3px;margin-bottom:12px}
.stabs::-webkit-scrollbar{display:none}
.stab{padding:7px 13px;font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#8892a4;cursor:pointer;white-space:nowrap;border-radius:5px;flex-shrink:0}
.stab.active{background:#3CB70A;color:#0a1628}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:0.63rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#8892a4;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;background:#0d1e36;border:1px solid rgba(255,255,255,0.1);color:#fff;padding:10px 11px;border-radius:6px;font-family:'Barlow',sans-serif;font-size:0.88rem;outline:none;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#3CB70A}
.fg select option{background:#0d1e36}
.fg textarea{resize:vertical;min-height:65px;line-height:1.5}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-g{width:100%;background:#3CB70A;color:#0a1628;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem;letter-spacing:0.08em;text-transform:uppercase;border:none;padding:13px;border-radius:7px;cursor:pointer;margin-bottom:8px}
.btn-g:active{background:#2a8a06}
.btn-s{width:100%;background:rgba(255,255,255,0.06);color:#ccd6f6;font-family:'Barlow',sans-serif;font-weight:600;font-size:0.83rem;border:1px solid rgba(255,255,255,0.1);padding:11px;border-radius:7px;cursor:pointer;margin-bottom:8px}
.btn-add{width:100%;background:rgba(60,183,10,0.07);border:1px dashed rgba(60,183,10,0.25);color:#3CB70A;font-family:'Barlow',sans-serif;font-weight:600;font-size:0.78rem;padding:9px;border-radius:6px;cursor:pointer;margin-top:6px}
.back-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:none;color:#3CB70A;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.85rem;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;padding:0 0 10px 0}
.stepper{display:flex;align-items:center;background:#0d1e36;border:1px solid rgba(255,255,255,0.1);border-radius:6px;overflow:hidden}
.step-btn{background:none;border:none;color:#3CB70A;font-size:1.3rem;padding:7px 14px;cursor:pointer;font-family:'Barlow',sans-serif}
.step-val{flex:1;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:900}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.chip{padding:5px 10px;border-radius:13px;font-size:0.7rem;font-weight:600;border:1px solid rgba(255,255,255,0.12);color:#8892a4;cursor:pointer;background:none;transition:all 0.15s}
.chip.on{background:rgba(60,183,10,0.15);border-color:#3CB70A;color:#3CB70A}
.slider-row{display:flex;align-items:center;gap:10px}
.slider{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;background:#0d1e36;outline:none}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#3CB70A;cursor:pointer}
.sval{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900;color:#3CB70A;min-width:36px;text-align:right}
/* CARDS */
.card{background:#112240;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:13px;margin-bottom:8px}
.card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-name{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900;text-transform:uppercase}
.card-meta{font-size:0.68rem;color:#3CB70A;margin-top:2px}
.tag{padding:3px 8px;border-radius:10px;font-size:0.62rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;flex-shrink:0;margin-left:6px}
.tq{background:rgba(255,165,0,0.15);color:#ffa500;border:1px solid rgba(255,165,0,0.25)}
.tc{background:rgba(60,183,10,0.15);color:#3CB70A;border:1px solid rgba(60,183,10,0.25)}
.tp{background:rgba(0,150,255,0.15);color:#0096ff;border:1px solid rgba(0,150,255,0.25)}
.td{background:rgba(255,255,255,0.08);color:#8892a4;border:1px solid rgba(255,255,255,0.12)}
.tx{background:rgba(255,68,68,0.12);color:#ff4444;border:1px solid rgba(255,68,68,0.2)}
.to{background:rgba(255,165,0,0.1);color:#ffa500;border:1px solid rgba(255,165,0,0.2)}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.cdet{background:#0d1e36;border-radius:5px;padding:6px 8px}
.cdl{font-size:0.58rem;color:#8892a4;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:1px}
.cdv{font-size:0.82rem;font-weight:600;color:#ccd6f6}
.cdv.g{color:#3CB70A}.cdv.o{color:#ffa500}.cdv.r{color:#ff4444}
.pbar{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px}
.ps{background:#0d1e36;border-radius:4px;padding:5px;text-align:center;border:1px solid rgba(255,255,255,0.05)}
.ps.paid{background:rgba(60,183,10,0.1);border-color:rgba(60,183,10,0.25)}
.psl{font-size:0.56rem;color:#8892a4;text-transform:uppercase}
.psv{font-size:0.75rem;font-weight:700;color:#ccd6f6}
.ps.paid .psv{color:#3CB70A}
.card-acts{display:flex;gap:5px;flex-wrap:wrap}
.cbtn{padding:6px 10px;border-radius:4px;font-size:0.63rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;border:none;cursor:pointer;font-family:'Barlow',sans-serif}
.cb-g{background:#3CB70A;color:#0a1628}
.cb-w{background:#25D366;color:#fff}
.cb-e{background:rgba(255,255,255,0.07);color:#ccd6f6;border:1px solid rgba(255,255,255,0.1)}
.cb-d{background:rgba(255,68,68,0.08);color:#ff4444;border:1px solid rgba(255,68,68,0.15)}
.cb-s{background:rgba(60,183,10,0.1);color:#3CB70A;border:1px solid rgba(60,183,10,0.2)}
/* RESULT */
.result-box{background:#112240;border:2px solid #3CB70A;border-radius:12px;padding:16px;text-align:center;margin-bottom:12px}
.rb-label{font-size:0.68rem;color:#8892a4;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px}
.rb-val{font-family:'Barlow Condensed',sans-serif;font-size:3.5rem;font-weight:900;color:#3CB70A;line-height:1}
.rb-sub{font-size:0.75rem;color:#8892a4;margin-top:4px}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:10px}
.ri{background:#0d1e36;border-radius:6px;padding:8px 5px;text-align:center}
.ril{font-size:0.56rem;color:#8892a4;text-transform:uppercase;margin-bottom:2px}
.riv{font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:900}
.rv-g{color:#3CB70A}.rv-o{color:#ffa500}.rv-r{color:#ff4444}.rv-w{color:#ccd6f6}
.pay3{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:10px}
.p3{background:#0d1e36;border-radius:6px;padding:8px 5px;text-align:center;border:1px solid rgba(60,183,10,0.2)}
.p3l{font-size:0.56rem;color:#3CB70A;text-transform:uppercase;font-weight:700;margin-bottom:2px}
.p3v{font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;font-weight:900}
.p3s{font-size:0.56rem;color:#8892a4;margin-top:1px}
/* MONEY */
.money-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.mg{background:#112240;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px}
.mgl{font-size:0.6rem;color:#8892a4;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:3px}
.mgv{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:900;color:#3CB70A;line-height:1}
.mgs{font-size:0.66rem;color:#8892a4;margin-top:2px}
.mgv.o{color:#ffa500}
.tax-box{background:rgba(255,165,0,0.07);border:1px solid rgba(255,165,0,0.2);border-radius:10px;padding:14px;margin-bottom:10px}
.tax-title{font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:900;text-transform:uppercase;color:#ffa500;letter-spacing:0.1em;margin-bottom:5px}
.tax-amt{font-family:'Barlow Condensed',sans-serif;font-size:2.2rem;font-weight:900;color:#ffa500}
.tax-sub{font-size:0.7rem;color:#8892a4;margin-top:3px}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.mrow:last-child{border-bottom:none}
.ml{font-size:0.82rem;color:#ccd6f6}
.mv{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900}
.mv-g{color:#3CB70A}.mv-o{color:#ffa500}.mv-r{color:#ff4444}.mv-w{color:#ccd6f6}
.entry-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.e-desc{flex:1;background:#0d1e36;border:1px solid rgba(255,255,255,0.08);color:#fff;padding:9px 10px;border-radius:5px;font-family:'Barlow',sans-serif;font-size:0.84rem;outline:none}
.e-desc:focus{border-color:#3CB70A}
.e-amt{width:80px;background:#0d1e36;border:1px solid rgba(255,255,255,0.08);color:#fff;padding:9px 8px;border-radius:5px;font-family:'Barlow',sans-serif;font-size:0.84rem;outline:none;text-align:right}
.e-amt:focus{border-color:#3CB70A}
.e-del{background:none;border:none;color:#ff4444;font-size:1.1rem;cursor:pointer;padding:2px 5px;flex-shrink:0}
/* CHECKLIST */
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;background:#0d1e36;border-radius:7px;cursor:pointer;border:1px solid transparent;margin-bottom:5px}
.cl-item.done{background:rgba(60,183,10,0.05);border-color:rgba(60,183,10,0.18)}
.cl-box{width:18px;height:18px;border:2px solid rgba(255,255,255,0.2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
.cl-item.done .cl-box{background:#3CB70A;border-color:#3CB70A}
.cl-tick{color:#0a1628;font-size:0.65rem;font-weight:900;display:none}
.cl-item.done .cl-tick{display:block}
.cl-text h4{font-size:0.82rem;font-weight:600;color:#ccd6f6}
.cl-item.done .cl-text h4{color:#8892a4;text-decoration:line-through}
.cl-text p{font-size:0.68rem;color:#8892a4;margin-top:1px}
/* INFO BOXES */
.ibox{background:rgba(60,183,10,0.06);border:1px solid rgba(60,183,10,0.15);border-radius:7px;padding:9px 11px;font-size:0.75rem;color:#8892a4;line-height:1.5;margin-top:7px}
.ibox strong{color:#3CB70A}
.wbox{background:rgba(255,165,0,0.06);border:1px solid rgba(255,165,0,0.2);border-radius:7px;padding:9px 11px;font-size:0.75rem;color:#8892a4;line-height:1.5;margin-top:7px}
.wbox strong{color:#ffa500}
.dbox{background:rgba(255,68,68,0.06);border:1px solid rgba(255,68,68,0.2);border-radius:7px;padding:9px 11px;font-size:0.75rem;color:#8892a4;line-height:1.5;margin-top:7px}
.dbox strong{color:#ff4444}
/* MEASURE */
.meas-area{background:#0d1e36;border-radius:8px;padding:11px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.07)}
.meas-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.meas-name{background:none;border:none;color:#3CB70A;font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:900;text-transform:uppercase;outline:none;width:120px}
.meas-del{background:none;border:none;color:#ff4444;font-size:1rem;cursor:pointer;padding:0}
.meas-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px}
.meas-input-wrap label{font-size:0.58rem;color:#8892a4;text-transform:uppercase;margin-bottom:3px;display:block}
.meas-input{width:100%;background:#112240;border:1px solid rgba(255,255,255,0.1);color:#fff;padding:8px;border-radius:5px;font-family:'Barlow',sans-serif;font-size:0.88rem;outline:none;text-align:center}
.meas-input:focus{border-color:#3CB70A}
.meas-result{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;background:rgba(60,183,10,0.05);border-radius:5px;padding:7px;text-align:center}
.mr-label{font-size:0.56rem;color:#8892a4;text-transform:uppercase}
.mr-val{font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;font-weight:900;color:#3CB70A}
.meas-total-box{background:#0d1e36;border-radius:8px;padding:11px;margin-top:6px;display:none}
.mt-title{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:900;text-transform:uppercase;color:#3CB70A;letter-spacing:0.08em;margin-bottom:7px}
/* HASHTAG */
.htag{background:#0d1e36;border:1px solid rgba(255,255,255,0.1);color:#ccd6f6;padding:5px 9px;border-radius:12px;font-size:0.7rem;cursor:pointer;margin:3px}
.htag.on{background:rgba(60,183,10,0.15);border-color:#3CB70A;color:#3CB70A}
.hgrp-label{font-size:0.63rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#8892a4;margin:10px 0 5px}
/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:500;align-items:flex-end}
.modal-ov.open{display:flex}
.modal{background:#0d1e36;border-radius:16px 16px 0 0;padding:20px 16px;width:100%;max-height:90vh;overflow-y:auto;border-top:2px solid #3CB70A}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900;text-transform:uppercase;margin-bottom:14px;color:#3CB70A}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.modal-ok{background:#3CB70A;color:#0a1628;font-weight:700;padding:12px;border:none;border-radius:6px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:0.88rem;text-transform:uppercase}
.modal-cn{background:rgba(255,255,255,0.07);color:#ccd6f6;font-weight:700;padding:12px;border:1px solid rgba(255,255,255,0.1);border-radius:6px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:0.88rem}
/* HOME */
.dash-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.ds{background:#112240;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:13px}
.ds-label{font-size:0.6rem;color:#8892a4;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:3px}
.ds-val{font-family:'Barlow Condensed',sans-serif;font-size:1.9rem;font-weight:900;color:#3CB70A;line-height:1}
.ds-sub{font-size:0.66rem;color:#8892a4;margin-top:2px}
.ds-val.o{color:#ffa500}
.alert-card{background:#112240;border-left:3px solid #ff4444;border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer}
.alert-card.o{border-left-color:#ffa500}
.alert-card.g{border-left-color:#3CB70A}
.at{font-size:0.82rem;color:#ccd6f6;font-weight:600}
.as{font-size:0.7rem;color:#8892a4;margin-top:2px}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.qa{background:#112240;border:1px solid rgba(60,183,10,0.2);border-radius:10px;padding:12px;cursor:pointer;display:flex;align-items:center;gap:10px}
.qa:active{background:rgba(60,183,10,0.08)}
.qa-icon{font-size:1.5rem;flex-shrink:0}
.qa-text h4{font-family:'Barlow Condensed',sans-serif;font-size:0.88rem;font-weight:900;text-transform:uppercase}
.qa-text p{font-size:0.65rem;color:#8892a4;margin-top:1px}
.sec-label{font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;font-weight:900;text-transform:uppercase;color:#8892a4;letter-spacing:0.1em;margin-bottom:8px}
/* WA FLOAT */
.wa-float{position:fixed;bottom:76px;right:14px;z-index:99;background:#25D366;color:#fff;width:50px;height:50px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:1.3rem;text-decoration:none;box-shadow:0 4px 14px rgba(37,211,102,0.4)}
.empty{text-align:center;padding:36px 20px;color:#8892a4}
.empty-icon{font-size:2.4rem;margin-bottom:10px}
.empty h3{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900;text-transform:uppercase;margin-bottom:6px;color:#ccd6f6}
.empty p{font-size:0.8rem;line-height:1.5}
.hidden{display:none}
</style>
</head>

<script>
// ═══════════════════════════════════════════
// DATA & STATE
// ═══════════════════════════════════════════
const TAX = 0.27;
let jobs = JSON.parse(localStorage.getItem('dgj') || '[]');
let weekData = JSON.parse(localStorage.getItem('dgw') || '{}');
let savedQuotes = JSON.parse(localStorage.getItem('dgq') || '[]');
let contentPosts = JSON.parse(localStorage.getItem('dgc') || '{}');
let selHashtags = new Set(['#dreamgroundworks','#westofscotland','#excavation','#groundworks','#beforeandafter','#fyp']);
let curPage = 'home', editJobId = null;
let jobSubTab = 'all', moneySubTab = 'week', quoteSubTab = 'visit', msgSubTab = 'enquiry', contentSubTab = 'plan';
let weekOffset = 0, contentWeekOffset = 0;
// Quote calc state
let qDays = 1, qHireDays = 5, qSkips = 0, qRisk = 0, qResult = null;
// Visit state
let measurements = [{id:'m0', name:'Area 1', l:'', w:'', d:'200'}];
let visitChecks = {}, riskChecks = {}, chipSel = {};
let vName='', vPhone='', vJobType='Driveway Excavation', vAddr='', vSizeNotes='', vAccessNotes='', vExpect='', vAgreed='', vNotes='';
// Weekly
let incEntries=[{id:'i0',desc:'',amt:''}], expEntries=[{id:'e0',desc:'',amt:''}], outEntries=[{id:'o0',desc:'',amt:''}], wkChecks={}, taxDone=false;
// Invoice
let invLines=[{id:'l0',desc:'Excavation works — as agreed',qty:'1',rate:''}];
let invNum='DG-001', invDate='', invCust='', invAddr='', invDep=0, invMat=0, invBal=0, invBank='Dream Groundworks', invSort='', invAcc='';
let invPrice=0, invDesc='';

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}
function fmt(n){return '£'+Math.round(n||0).toLocaleString();}
function fmtD(n){return '£'+(parseFloat(n)||0).toLocaleString();}
function getPaid(j){return (parseFloat(j.dep)||0)+(parseFloat(j.mat)||0)+(parseFloat(j.bal)||0);}
function getOwed(j){const q=parseFloat(j.quote)||0;return j.status==='cancelled'||j.status==='declined'?0:Math.max(0,q-getPaid(j));}
function daysSince(d){return d?Math.floor((Date.now()-new Date(d))/86400000):null;}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function uid(){return Date.now().toString()+Math.random().toString(36).slice(2,5);}

document.getElementById('hdrDate').textContent = new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
invDate = new Date().toISOString().split('T')[0];

// ═══════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════
function nav(page){
  curPage=page;
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bni').forEach(b=>b.classList.remove('active'));
  document.getElementById('pg-'+page).classList.add('active');
  document.getElementById('bni-'+page).classList.add('active');
  document.getElementById('waFloat').style.display = page==='home'?'flex':'none';
  const r={home:renderHome,jobs:renderJobs,quote:renderQuote,money:renderMoney,msg:renderMsg,content:renderContent};
  if(r[page]) r[page]();
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════
function renderHome(){
  const el=document.getElementById('pg-home');
  const now=new Date(), mn=now.getMonth(), yr=now.getFullYear();
  const active=jobs.filter(j=>j.status==='inprogress'||j.status==='confirmed').length;
  const quoted=jobs.filter(j=>j.status==='quoted').length;
  const allPaid=jobs.reduce((s,j)=>s+getPaid(j),0);
  const monthJobs=jobs.filter(j=>{if(!j.created)return false;const d=new Date(j.created);return d.getMonth()===mn&&d.getFullYear()===yr;});
  const mRev=monthJobs.reduce((s,j)=>s+getPaid(j),0);
  const mProfit=mRev*(1-TAX);
  const owed=jobs.reduce((s,j)=>s+getOwed(j),0);
  const taxPot=allPaid*TAX;
  // Week
  const wkStart=new Date(now);wkStart.setDate(now.getDate()-((now.getDay()+6)%7));wkStart.setHours(0,0,0,0);
  const wk=weekData[wkStart.toISOString().split('T')[0]]||{};
  const wRev=wk.totalIn||0;
  const followUp=jobs.filter(j=>j.status==='quoted'&&j.qsent&&daysSince(j.qsent)>=3);
  const soonJobs=jobs.filter(j=>{if(!j.date||j.status==='completed'||j.status==='cancelled'||j.status==='declined')return false;const d=Math.ceil((new Date(j.date)-now)/86400000);return d>=0&&d<=2;});
  const unpaid=jobs.filter(j=>getOwed(j)>0&&j.status!=='quoted'&&j.status!=='cancelled'&&j.status!=='declined');
  const greet=now.getHours()<12?'Morning':now.getHours()<17?'Afternoon':'Evening';
  el.innerHTML=`

const SL={quoted:'Quoted',confirmed:'Confirmed',inprogress:'In Progress',completed:'Completed',declined:'Declined',onhold:'On Hold',cancelled:'Cancelled'};
const SC={quoted:'tq',confirmed:'tc',inprogress:'tp',completed:'td',declined:'tx',onhold:'to',cancelled:'tx'};
const NEXT={quoted:'→ Confirm',confirmed:'→ In Progress',inprogress:'→ Complete',completed:'→ Decline',declined:'→ On Hold',onhold:'→ Quoted'};

function renderJobs(){
  const el=document.getElementById('pg-jobs');
  let list=jobs.filter(j=>j.status!=='cancelled');
  if(jobSubTab==='active') list=jobs.filter(j=>j.status==='inprogress'||j.status==='confirmed');
  else if(jobSubTab==='quoted') list=jobs.filter(j=>j.status==='quoted');
  else if(jobSubTab==='completed') list=jobs.filter(j=>j.status==='completed');
  const tabs=['all','active','quoted','completed'];
  const tl=['All','Active','Quoted','Done'];
  el.innerHTML=`<button class="btn-g" onclick="openAddJob()">+ Add New Job</button>
    <div class="stabs">${tabs.map((t,i)=>`<div class="stab ${jobSubTab===t?'active':''}" onclick="jobSubTab='${t}';renderJobs()">${tl[i]}</div>`).join('')}</div>
    ${list.length?list.map(j=>buildJobCard(j)).join(''):`<div class="empty"><div class="empty-icon">🏗️</div><h3>No Jobs</h3><p>Tap the button above to add a job.</p></div>`}`;
}

function buildJobCard(j){
  const q=parseFloat(j.quote)||0, paid=getPaid(j), owed=getOwed(j);
  const dep=parseFloat(j.dep)||0, mat=parseFloat(j.mat)||0, bal=parseFloat(j.bal)||0;
  const ds=j.qsent?daysSince(j.qsent):null;
  const flag=j.status==='quoted'&&ds>=3?`<div style="background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.25);border-radius:5px;padding:6px 9px;margin-bottom:7px;font-size:0.7rem;color:#ff4444;font-weight:600">⚠️ Quote sent ${ds} days ago — follow up</div>`:'';
  return `<div class="card">
    ${flag}
    <div class="card-hd"><div><div class="card-name">${j.name}</div><div class="card-meta">${j.type||''}${j.loc?' · '+j.loc:''}</div></div><div class="tag ${SC[j.status]||'td'}">${SL[j.status]||j.status}</div></div>
    <div class="cgrid">
      <div class="cdet"><div class="cdl">Date</div><div class="cdv">${j.date?new Date(j.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'TBC'}</div></div>
      <div class="cdet"><div class="cdl">Quote</div><div class="cdv g">${q?fmtD(q):'TBC'}</div></div>
      <div class="cdet"><div class="cdl">Received</div><div class="cdv ${paid>0?'g':''}">${paid>0?fmtD(paid):'£0'}</div></div>
      <div class="cdet"><div class="cdl">Owed</div><div class="cdv ${owed>0?'o':'g'}">${owed>0?fmtD(owed):'✓ Clear'}</div></div>
    </div>
    ${q>0?`<div class="pbar">
      <div class="ps ${dep>0?'paid':''}"><div class="psl">Deposit ${dep>0?'✓':''}</div><div class="psv">${dep>0?fmtD(dep):'£'+Math.round(q*0.1)}</div></div>
      <div class="ps ${mat>0?'paid':''}"><div class="psl">Materials ${mat>0?'✓':''}</div><div class="psv">${mat>0?fmtD(mat):'—'}</div></div>
      <div class="ps ${bal>0?'paid':''}"><div class="psl">Balance ${bal>0?'✓':''}</div><div class="psv">${bal>0?fmtD(bal):owed>0?fmtD(owed):'—'}</div></div>
    </div>`:''}
    ${j.notes?`<div style="background:#0d1e36;border-radius:5px;padding:7px 9px;font-size:0.74rem;color:#8892a4;margin-bottom:7px;line-height:1.5">${j.notes}</div>`:''}
    <div class="card-acts">
      ${j.phone?`<button class="cbtn cb-g" onclick="window.location='tel:${j.phone}'">📞</button>`:''}
      ${j.phone?`<button class="cbtn cb-w" onclick="window.open('https://wa.me/44${(j.phone||'').replace(/^0/,'').replace(/\s/g,'')}')">💬</button>`:''}
      <button class="cbtn cb-s" onclick="cycleStatus('${j.id}')">${NEXT[j.status]||'Next'}</button>
      <button class="cbtn cb-e" onclick="editJob('${j.id}')">Edit</button>
      <button class="cbtn cb-d" onclick="delJob('${j.id}')">Del</button>
    </div>
  </div>`;
}

function openAddJob(){
  editJobId=null;
  document.getElementById('jModalTitle').textContent='Add New Job';
  ['jName','jPhone','jLoc','jQuote','jDays','jDep','jMat','jBal','jNotes','jQSent'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('jType').value='Driveway Excavation';
  document.getElementById('jStatus').value='quoted';
  document.getElementById('jDate').value='';
  openModal('jobModal');
}

function editJob(id){
  const j=jobs.find(x=>x.id===id); if(!j) return;
  editJobId=id;
  document.getElementById('jModalTitle').textContent='Edit Job';
  document.getElementById('jName').value=j.name||'';
  document.getElementById('jPhone').value=j.phone||'';
  document.getElementById('jType').value=j.type||'Driveway Excavation';
  document.getElementById('jLoc').value=j.loc||'';
  document.getElementById('jDate').value=j.date||'';
  document.getElementById('jStatus').value=j.status||'quoted';
  document.getElementById('jQuote').value=j.quote||'';
  document.getElementById('jDays').value=j.days||'';
  document.getElementById('jDep').value=j.dep||'';
  document.getElementById('jMat').value=j.mat||'';
  document.getElementById('jBal').value=j.bal||'';
  document.getElementById('jNotes').value=j.notes||'';
  document.getElementById('jQSent').value=j.qsent||'';
  openModal('jobModal');
}

function saveJob(){
  const name=document.getElementById('jName').value.trim();
  if(!name){alert('Enter a customer name');return;}
  const j={id:editJobId||uid(),name,phone:document.getElementById('jPhone').value.trim(),type:document.getElementById('jType').value,loc:document.getElementById('jLoc').value.trim(),date:document.getElementById('jDate').value,status:document.getElementById('jStatus').value,quote:document.getElementById('jQuote').value,days:document.getElementById('jDays').value,dep:document.getElementById('jDep').value,mat:document.getElementById('jMat').value,bal:document.getElementById('jBal').value,notes:document.getElementById('jNotes').value.trim(),qsent:document.getElementById('jQSent').value,created:editJobId?jobs.find(x=>x.id===editJobId)?.created:new Date().toISOString()};
  jobs=editJobId?jobs.map(x=>x.id===editJobId?j:x):[j,...jobs];
  save('dgj',jobs); closeModal('jobModal'); renderJobs(); if(curPage==='home') renderHome();
}

function delJob(id){if(confirm('Delete this job?')){jobs=jobs.filter(x=>x.id!==id);save('dgj',jobs);renderJobs();if(curPage==='home')renderHome();}}
function cycleStatus(id){
  const order=['quoted','confirmed','inprogress','completed','declined','onhold'];
  const j=jobs.find(x=>x.id===id); if(!j) return;
  j.status=order[(order.indexOf(j.status)+1)%order.length];
  save('dgj',jobs); renderJobs(); if(curPage==='home') renderHome();
}

// MEASUREMENTS
function addMeas(){
  measurements.push({id:uid(), name:'Area '+(measurements.length+1), l:'', w:'', d:'200'});
  renderMeasList();
}
function delMeas(id){
  if(measurements.length<=1){
    measurements=[{id:uid(),name:'Area 1',l:'',w:'',d:'200'}];
  } else {
    measurements=measurements.filter(m=>m.id!==id);
  }
  renderMeasList();
}
function renderMeasList(){
  const el=document.getElementById('measList'); if(!el) return;
  el.innerHTML=measurements.map((m,idx)=>{
    const l=parseFloat(m.l)||0, w=parseFloat(m.w)||0, d=parseFloat(m.d)||200;
    const area=l&&w?+(l*w).toFixed(2):0, vol=area?(+(area*(d/1000)).toFixed(2)):0;
    const skips=area?Math.ceil(vol/6):0;
    return `<div style="background:#0d1e36;border-radius:8px;padding:11px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.08)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <input type="text" value="${m.name}" placeholder="Area name" style="background:none;border:none;color:#3CB70A;font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;font-weight:900;text-transform:uppercase;outline:none;flex:1" onchange="measurements.find(x=>x.id==='${m.id}').name=this.value">
        <button onclick="delMeas('${m.id}')" style="background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.25);color:#ff4444;border-radius:4px;padding:3px 10px;font-size:0.75rem;font-weight:700;cursor:pointer;font-family:Barlow,sans-serif;margin-left:8px">Remove</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">
        <div>
          <div style="font-size:0.6rem;color:#8892a4;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Length (m)</div>
          <input type="number" inputmode="decimal" value="${m.l}" placeholder="0" style="width:100%;background:#112240;border:1px solid rgba(255,255,255,0.12);color:#fff;padding:10px 8px;border-radius:6px;font-family:'Barlow',sans-serif;font-size:1rem;outline:none;text-align:center;-webkit-appearance:none" oninput="measurements.find(x=>x.id==='${m.id}').l=this.value;calcMeasTotals()">
        </div>
        <div>
          <div style="font-size:0.6rem;color:#8892a4;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Width (m)</div>
          <input type="number" inputmode="decimal" value="${m.w}" placeholder="0" style="width:100%;background:#112240;border:1px solid rgba(255,255,255,0.12);color:#fff;padding:10px 8px;border-radius:6px;font-family:'Barlow',sans-serif;font-size:1rem;outline:none;text-align:center;-webkit-appearance:none" oninput="measurements.find(x=>x.id==='${m.id}').w=this.value;calcMeasTotals()">
        </div>
        <div>
          <div style="font-size:0.6rem;color:#8892a4;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Depth (mm)</div>
          <input type="number" inputmode="decimal" value="${m.d}" placeholder="200" style="width:100%;background:#112240;border:1px solid rgba(255,255,255,0.12);color:#fff;padding:10px 8px;border-radius:6px;font-family:'Barlow',sans-serif;font-size:1rem;outline:none;text-align:center;-webkit-appearance:none" oninput="measurements.find(x=>x.id==='${m.id}').d=this.value;calcMeasTotals()">
        </div>
      </div>
      ${area>0?`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:rgba(60,183,10,0.06);border-radius:6px;padding:8px;text-align:center">
        <div><div style="font-size:0.56rem;color:#8892a4;text-transform:uppercase;margin-bottom:2px">Area</div><div style="font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:900;color:#3CB70A">${area}m²</div></div>
        <div><div style="font-size:0.56rem;color:#8892a4;text-transform:uppercase;margin-bottom:2px">Volume</div><div style="font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:900;color:#3CB70A">${vol}m³</div></div>
        <div><div style="font-size:0.56rem;color:#8892a4;text-transform:uppercase;margin-bottom:2px">Skips ~</div><div style="font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:900;color:#ffa500">${skips}</div></div>
        <div><div style="font-size:0.56rem;color:#8892a4;text-transform:uppercase;margin-bottom:2px">Area #</div><div style="font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:900;color:#8892a4">${idx+1}</div></div>
      </div>`:'<div style="font-size:0.72rem;color:#8892a4;text-align:center;padding:4px 0">Enter length and width to see calculations</div>'}
    </div>`;
  }).join('');
  calcMeasTotals();
}
function calcMeasTotals(){
  let tArea=0, tVol=0;
  measurements.forEach(m=>{const l=parseFloat(m.l)||0,w=parseFloat(m.w)||0,d=parseFloat(m.d)||200;if(l&&w){tArea+=l*w;tVol+=(l*w)*(d/1000);}});
  const tSkips=Math.ceil(tVol/6);
  const totEl=document.getElementById('measTotals');
  if(totEl){
    totEl.classList.toggle('hidden',tArea===0);
    if(tArea>0){
      document.getElementById('tArea').textContent=tArea.toFixed(1)+' m²';
      document.getElementById('tVol').textContent=tVol.toFixed(1)+' m³';
      document.getElementById('tSkips').textContent=tSkips;
    }
  }
  qSkips=tSkips;
  const sv=document.getElementById('qSkipsVal'); if(sv) sv.textContent=qSkips;
}
function toggleChip(val,group){
  if(!chipSel[group]) chipSel[group]=[];
  if(chipSel[group].includes(val)) chipSel[group]=chipSel[group].filter(v=>v!==val);
  else chipSel[group].push(val);
}

function calcQuote(){
  const hire=parseFloat(document.getElementById('qHire')?.value)||260;
  const fuel=parseFloat(document.getElementById('qFuel')?.value)||35;
  const rate=parseFloat(document.getElementById('qRate')?.value)||500;
  const sc=parseFloat(document.getElementById('qSkipCost')?.value)||180;
  const mat=parseFloat(document.getElementById('qMat')?.value)||0;
  const other=parseFloat(document.getElementById('qOther')?.value)||0;
  const margin=parseFloat(document.getElementById('qMargin')?.value)||20;
  const hpd=(hire/qHireDays);
  const costs=(hpd*qDays)+(fuel*qDays)+(qSkips*sc)+mat+other;
  const wage=rate*qDays;
  const sub=costs+wage;
  const risk=sub*(qRisk/100);
  const marg=(sub+risk)*(margin/100);
  const raw=sub+risk+marg;
  const rounded=Math.ceil(raw/50)*50;
  const profit=rounded-costs-wage;
  qResult={quote:rounded,costs,wage,profit,afterTax:profit*0.73,margin,days:qDays,materials:mat,deposit:Math.round(rounded*0.1),balance:rounded-Math.round(rounded*0.1)-mat};
}

// Update totals without touching any input fields
function invCalc(){
  const price = invPrice||0;
  const paid = (invDep||0)+(invMat||0);
  const owed = Math.max(0, price-paid);
  const tax = price*0.27;
  const profit = price-tax;
  const owedEl=document.getElementById('inv_owed');
  const taxEl=document.getElementById('inv_tax');
  const profEl=document.getElementById('inv_profit');
  if(owedEl) owedEl.textContent='£'+Math.round(owed).toLocaleString();
  if(taxEl) taxEl.textContent='£'+Math.round(tax).toLocaleString();
  if(profEl) profEl.textContent='£'+Math.round(profit).toLocaleString();
}

function clearInvoice(){
  if(!confirm('Clear this invoice?')) return;
  invPrice=0; invDesc=''; invDep=0; invMat=0; invBal=0;
  invCust=''; invAddr='';
  invNum='DG-'+String(Date.now()).slice(-3);
  renderMoney();
}

      <button onclick="waTmpl(${i})" style="background:#25D366;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.8rem;letter-spacing:0.06em;text-transform:uppercase;border:none;padding:9px 13px;border-radius:5px;cursor:pointer">💬 WA</button>
    </div>
  </div>`).join('')}`;
}

function getFilledTmpl(idx){
  const filtered=TMPL.filter(t=>t.cat===msgSubTab);
  const t=filtered[idx]; let msg=t.msg;
  (t.fields||[]).forEach(f=>{const el=document.getElementById(`tf_${idx}_${f}`);const v=el?el.value.trim():'';msg=msg.replace(new RegExp('\\['+f+'\\]','g'),v||`[${f}]`);});
  return msg;
}
function updTmpl(idx){const el=document.getElementById(`tp_${idx}`);if(el)el.textContent=getFilledTmpl(idx);}
function copyTmpl(idx){
  const msg=getFilledTmpl(idx);
  navigator.clipboard.writeText(msg).catch(()=>{const ta=document.createElement('textarea');ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);});
  const btn=document.getElementById(`tcb_${idx}`);if(btn){btn.textContent='Copied ✓';setTimeout(()=>btn.textContent='Copy',2000);}
}
function waTmpl(idx){window.open('https://wa.me/?text='+encodeURIComponent(getFilledTmpl(idx)));}

  {type:'Tip / Advice',platform:'TikTok',desc:'Share something useful — what to check before hiring groundworks.',caption:'Before you hire anyone for groundworks — watch this 👇 #advice #homeowner #fyp'},
];
const HTAGS={brand:['#dreamgroundworks','#dreamgroundworksdg'],location:['#westofscotland','#scotland','#glasgow','#paisley','#ayrshire'],services:['#excavation','#groundworks','#driveway','#driveways','#foundations','#landscaping','#minidigger','#digger','#groundlevelling'],viral:['#tradesman','#tradesmen','#construction','#satisfying','#beforeandafter','#transformation','#smallbusiness','#selfemployed','#fyp','#foryou','#viral']};

function getCWkDates(off){const d=new Date(),m=new Date(d);m.setDate(d.getDate()-((d.getDay()+6)%7)+(off*7));m.setHours(0,0,0,0);return CDAYS.map((_,i)=>{const dd=new Date(m);dd.setDate(m.getDate()+i);return dd;});}
function cDayKey(d){return d.toISOString().split('T')[0];}
function isTdy(d){return cDayKey(d)===cDayKey(new Date());}

function renderContent(){
  const el=document.getElementById('pg-content');
  const tabs=[{k:'plan',l:'Weekly Plan'},{k:'ideas',l:'Ideas'},{k:'hashtags',l:'Hashtags'}];
  el.innerHTML=`<div class="stabs">${tabs.map(t=>`<div class="stab ${contentSubTab===t.k?'active':''}" onclick="contentSubTab='${t.k}';renderContent()">${t.l}</div>`).join('')}</div><div id="cContent"></div>`;
  const cc=document.getElementById('cContent');
  if(contentSubTab==='plan') renderContentPlan(cc);
  else if(contentSubTab==='ideas') renderContentIdeas(cc);
  else renderHashtags(cc);
}

function renderContentPlan(el){
  const dates=getCWkDates(contentWeekOffset);
  const all=dates.flatMap(d=>(contentPosts[cDayKey(d)]||[]));
  const label=contentWeekOffset===0?'This Week':contentWeekOffset===-1?'Last Week':dates[0].toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' week';
  el.innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;background:#112240;border:1px solid rgba(60,183,10,0.2);border-radius:10px;padding:12px 14px;margin-bottom:12px">
    <div><div style="font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;font-weight:900;color:#3CB70A;text-transform:uppercase">${label}</div><div style="font-size:0.7rem;color:#8892a4;margin-top:1px">${all.length} planned · ${all.filter(p=>p.status==='posted').length} posted</div></div>
    <div style="display:flex;gap:6px">
      <button onclick="contentWeekOffset--;renderContent()" style="background:rgba(60,183,10,0.1);border:1px solid rgba(60,183,10,0.25);color:#3CB70A;padding:5px 12px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer">◀</button>
      <button onclick="if(contentWeekOffset<0){contentWeekOffset++;renderContent()}" style="background:rgba(60,183,10,0.1);border:1px solid rgba(60,183,10,0.25);color:#3CB70A;padding:5px 12px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer">▶</button>
    </div>
  </div>
  ${dates.map(d=>{
    const k=cDayKey(d), posts=contentPosts[k]||[], today=isTdy(d);
    const pc={tiktok:'#ff0050',instagram:'#e1306c',both:'#ffa500'};
    return `<div class="card">
      <div class="card-hd"><div><div class="card-name" style="font-size:0.88rem">${CDAYS[dates.indexOf(d)]}</div><div class="card-meta">${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div></div>${today?'<div style="background:#3CB70A;color:#0a1628;font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:2px 8px;border-radius:10px">TODAY</div>':''}</div>
      ${posts.length?posts.map(p=>`<div style="background:#0d1e36;border-radius:6px;padding:8px;margin-bottom:6px;border-left:3px solid ${pc[p.platform]||'#3CB70A'};${p.status==='posted'?'opacity:0.5':''}">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px"><div style="font-size:0.63rem;font-weight:700;text-transform:uppercase;color:${pc[p.platform]}">${p.platform}</div><div style="font-size:0.63rem;color:${p.status==='posted'?'#3CB70A':p.status==='scheduled'?'#ffa500':'#8892a4'};font-weight:700;text-transform:uppercase">${p.status}</div></div>
        <div style="font-size:0.8rem;font-weight:600;color:#ccd6f6">${p.type}</div>
        ${p.caption?`<div style="font-size:0.7rem;color:#8892a4;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${p.caption}</div>`:''}
        <div style="display:flex;gap:5px;margin-top:6px">
          <button onclick="togglePosted('${k}','${p.id}')" style="padding:4px 8px;border-radius:3px;font-size:0.6rem;font-weight:700;text-transform:uppercase;background:rgba(60,183,10,0.1);color:#3CB70A;border:1px solid rgba(60,183,10,0.25);cursor:pointer">${p.status==='posted'?'Unmark':'Posted ✓'}</button>
          <button onclick="delPost('${k}','${p.id}')" style="padding:4px 8px;border-radius:3px;font-size:0.6rem;font-weight:700;text-transform:uppercase;background:rgba(255,68,68,0.08);color:#ff4444;border:1px solid rgba(255,68,68,0.15);cursor:pointer">Del</button>
        </div>
      </div>`).join(''):`<div style="font-size:0.74rem;color:#8892a4;padding:4px 0">No posts planned</div>`}
      <button class="btn-add" style="margin-top:5px" onclick="addPost('${k}')">+ Add Post</button>
    </div>`;
  }).join('')}`;
}

function addPost(dayK){
  const types=['Before & After','Timelapse','Machine Working','Talking to Camera','Day in the Life','Stump Removal','Transformation','Tip / Advice'];
  const type=prompt('Post type:\n'+types.map((t,i)=>`${i+1}. ${t}`).join('\n')+'\n\nType the name or number:');
  if(!type) return;
  const typeVal=types[parseInt(type)-1]||type;
  const platform=prompt('Platform? Type: both / tiktok / instagram','both');
  const caption=prompt('Caption? (optional)','');
  if(!contentPosts[dayK]) contentPosts[dayK]=[];
  contentPosts[dayK].push({id:uid(),type:typeVal,platform:platform||'both',status:'idea',caption:caption||''});
  save('dgc',contentPosts); renderContent();
}
function togglePosted(k,id){const p=(contentPosts[k]||[]).find(x=>x.id===id);if(p){p.status=p.status==='posted'?'idea':'posted';save('dgc',contentPosts);renderContent();}}
function delPost(k,id){contentPosts[k]=(contentPosts[k]||[]).filter(p=>p.id!==id);save('dgc',contentPosts);renderContent();}

function renderContentIdeas(el){
  el.innerHTML=CIDEAS.map((idea,i)=>`<div class="card">
    <div class="card-hd"><div class="card-name" style="font-size:0.85rem">${idea.type}</div><div style="font-size:0.65rem;color:#8892a4">${idea.platform}</div></div>
    <div style="font-size:0.8rem;color:#ccd6f6;line-height:1.5;margin-bottom:8px">${idea.desc}</div>
    <div style="font-size:0.73rem;color:#8892a4;font-style:italic;line-height:1.4;margin-bottom:9px">"${idea.caption}"</div>
    <button id="icb_${i}" onclick="navigator.clipboard.writeText('${idea.caption.replace(/'/g,"\\'")}').then(()=>{document.getElementById('icb_${i}').textContent='Copied ✓';setTimeout(()=>document.getElementById('icb_${i}').textContent='Copy Caption',2000)}).catch(()=>alert('Long press to copy'))" style="background:rgba(255,255,255,0.07);color:#ccd6f6;border:1px solid rgba(255,255,255,0.1);padding:7px 13px;border-radius:5px;font-family:Barlow,sans-serif;font-size:0.73rem;font-weight:600;cursor:pointer">Copy Caption</button>
  </div>`).join('');
}

function renderHashtags(el){
  el.innerHTML=`<div class="sec"><div class="sec-title">Tap to Select — Copy All</div>
  ${Object.entries(HTAGS).map(([key,tags])=>`<div class="hgrp-label">${key.charAt(0).toUpperCase()+key.slice(1)}</div>
    <div style="display:flex;flex-wrap:wrap;margin-bottom:4px">${tags.map(t=>`<div class="htag ${selHashtags.has(t)?'on':''}" onclick="selHashtags.has('${t}')?selHashtags.delete('${t}'):selHashtags.add('${t}');this.className='htag '+(selHashtags.has('${t}')?'on':'')">${t}</div>`).join('')}</div>`).join('')}
  <button id="hashBtn" onclick="navigator.clipboard.writeText([...selHashtags].join(' ')).then(()=>{document.getElementById('hashBtn').textContent='Copied ✓';setTimeout(()=>document.getElementById('hashBtn').textContent='Copy Selected Hashtags',2000)}).catch(()=>alert('Select some hashtags first'))" style="width:100%;background:#3CB70A;color:#0a1628;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.9rem;letter-spacing:0.08em;text-transform:uppercase;border:none;padding:12px;border-radius:6px;cursor:pointer;margin-top:12px">Copy Selected Hashtags</button>
  </div>`;
}
